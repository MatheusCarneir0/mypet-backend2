[pytest]
DJANGO_SETTINGS_MODULE = config.settings.base
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=apps
    --cov-report=term-missing
    --cov-report=html
markers =
    auth: Authentication tests
    clientes: Cliente tests
    pets: Pet tests
    agendamentos: Agendamento tests
    servicos: Servico tests
    pagamentos: Pagamento tests
    notificacoes: Notificacao tests
    admin: Admin tests
    integration: Integration tests
